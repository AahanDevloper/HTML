<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: rgb(0, 56, 102);
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin: 5px;
            color: rgb(0, 225, 158);
        }

        h1 {
            margin-top: 40px;
            color: rgb(0, 225, 158);
        }

        .inputs {
            width: 28%;
            height: 49%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }

        input {
            width: 90%;
            height: 11%;
            text-align: center;
            border-radius: 9px;
            font-size: 18px;
            border: 2px solid rgb(0, 225, 158);
        }

        select {
            width: 90%;
            height: 14%;
            text-align: center;
            border-radius: 9px;
            border: 2px solid rgb(0, 225, 158);
        }

        button {
            width: 90%;
            height: 14%;
            border: none;
            border-radius: 9px;
            color: white;
            background-color: rgb(0, 225, 158);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h1>Option Details Calculator</h1>
        <div class="inputs">
            <select id="drop-down">
                <option value="0">Select Option</option>
                <option value="1">Long Call</option>
                <option value="2">Short Call</option>
                <option value="3">Long Put</option>
                <option value="4">Short Put</option>
            </select>
            <input placeholder="Enter Spot Price" type="number" id="spot-price">
            <input placeholder="Enter Strike Price" type="number" id="strike-price">
            <input placeholder="Enter Premium" type="number" id="premium">
            <input placeholder="Enter Closing Price" type="number" id="closing-price">
            <button onclick="showDetails()">Show Details</button>
        </div>
        <h2 id="profit"></h2>
        <h2 id="bep"></h2>
        <h2 id="max-profit"></h2>
        <h2 id="max-loss"></h2>
        <h2 id="pay-off"></h2>
    </div>
    <script>
        function showDetails() {
            let profit;
            let payOff;
            let spot = Number(document.getElementById("spot-price").value);
            let strike = Number(document.getElementById("strike-price").value);
            let premium = Number(document.getElementById("premium").value);
            let closing = Number(document.getElementById("closing-price").value);
            let option = Number(document.getElementById("drop-down").value);
            if (option == 0) {
                alert("Choose type of Options")
            }
            else if (option == 1) {
                // for long call
                if (closing >= strike) {
                    profit = (closing - strike) - premium;
                }
                else {
                    profit = -premium
                }
                let maxProfit = "Unlimited";
                let maxLoss = premium;
                let BEP = strike + premium;
                if (closing > strike) {
                    payOff = closing - strike;
                }
                else {
                    payOff = 0;
                }

            }
            else if (option == 2) {
                // for short call
                if (closing <= strike) {
                    if(strike - closing <=premium){
                        profit = premium-closing
                    }
                    else{
                        profit = premium
                        // profit = -((closing-strike)-premium);
                    }
                }
                else {
                    profit = -((closing-strike)-premium);
                }
                let maxProfit = premium;
                let maxLoss = strike-premium;
                let BEP = strike + premium;
                if (closing > strike) {
                    payOff = closing - strike;
                }
                else {
                    payOff = 0;
                }

            }
            // profit
            if (profit > 0) {
                document.getElementById("profit").innerHTML = "Your profit is: " + profit;
            }
            else if (profit < 0) {
                document.getElementById("profit").innerHTML = "Your profit is: " + profit;
            }
            else {
                document.getElementById("profit").innerHTML = "No profit, No loss";
            }

            // brake even point
            document.getElementById("bep").innerHTML = "Brake even point is: " + BEP;

            // max profit
            document.getElementById("max-profit").innerHTML = "Max profit can be: " + maxProfit;

            // max loss
            document.getElementById("max-loss").innerHTML = "Max loss can be: " + maxLoss;

            // max loss
            document.getElementById("pay-off").innerHTML = "Pay off: " + payOff;
        }
    </script>
</body>

</html>
