<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 50px;
            height: 50px;
            display: flex;
            flex-wrap: wrap;
        }
        .px{
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>
    <div class="box" id="box">
    </div>
    <script>
        for(let i = 0; i<2500; i++){
            let random1 = Math.floor(Math.random())
            let random2 = Math.floor(Math.random())
            let random3 = Math.floor(Math.random())
            document.getElementById("px"+i).style.backgroundColor="rgb("+random1+", "+random2+", "+random3+");"
            document.getElementById("box").innerHTML+="<div class='px' id='px"+i+"'></div>"
        }
    </script>
</body>
</html>
