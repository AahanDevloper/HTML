<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .button-container {
            width: 100%;
            height: 80%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        button {
            width: 20%;
            height: 30%;
            border-radius: 9px;
            color: white;
            font-size: 25px;
            border: none;
            background-color: rgb(0, 191, 255);
            margin-bottom: 30px;
        }

        button:hover {
            background-color: rgb(36, 200, 255);
        }

        .color {
            width: 100%;
            height: 60%;
            background-color: rgb(169, 169, 169);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="container">
            <h1>Random Color Generator</h1>
            <div class="button-container">
                <button onclick="randomColor()">Random Color</button>
                <button onclick="randomGradient()">Random Combination</button>
            </div>
            <p id="rgb"></p>
        </div>
        <div class="color" id="color"></div>
    </div>
    <script>
        let random1 = 0;
        let random2 = 0;
        let random3 = 0;
        let random4 = 0;
        let random5 = 0;
        let random6 = 0;
        let gradient;
        function randomColor() {
            random1 = Math.floor(Math.random() * 1000);
            while (random1 > 255) {
                random1 = Math.floor(Math.random() * 1000);
            }
            random2 = Math.floor(Math.random() * 1000);
            while (random2 > 255) {
                random2 = Math.floor(Math.random() * 1000);
            }
            random3 = Math.floor(Math.random() * 1000);
            while (random3 > 255) {
                random3 = Math.floor(Math.random() * 1000);
            }
            document.getElementById("rgb").innerHTML = "rgb(" + random1 + ", " + random2 + ", " + random3 + ")";
            document.getElementById("color").style.background = "none";
            document.getElementById("color").style.backgroundColor = "rgb(" + random1 + ", " + random2 + ", " + random3 + ")";
        }

        function randomGradient() {
            random1 = Math.floor(Math.random() * 1000);
            while (random1 > 255) {
                random1 = Math.floor(Math.random() * 1000);
            }
            random2 = Math.floor(Math.random() * 1000);
            while (random2 > 255) {
                random2 = Math.floor(Math.random() * 1000);
            }
            random3 = Math.floor(Math.random() * 1000);
            while (random3 > 255) {
                random3 = Math.floor(Math.random() * 1000);
            }
            random4 = Math.floor(Math.random() * 1000);
            while (random4 > 255) {
                random4 = Math.floor(Math.random() * 1000);
            }
            random5 = Math.floor(Math.random() * 1000);
            while (random5 > 255) {
                random5 = Math.floor(Math.random() * 1000);
            }
            random6 = Math.floor(Math.random() * 1000);
            while (random6 > 255) {
                random6 = Math.floor(Math.random() * 1000);
            }
            gradient =
                "linear-gradient( rgb( " +
                random1 +
                " , " +
                random2 +
                " , " +
                random3 +
                " ) , rgb( " +
                random4 +
                " , " +
                random5 +
                " , " +
                random6 +
                " ) ) ";
            document.getElementById("rgb").innerHTML = gradient;
            document.getElementById("color").style.backgroundColor = "none";
            document.getElementById("color").style.background = gradient;
        }
    </script>
</body>

</html>
