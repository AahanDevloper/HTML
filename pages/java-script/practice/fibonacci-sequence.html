<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibonacci Sequence</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin: 5px;
        }

        input {
            width: 25%;
            height: 40px;
            font-size: 24px;
            border-radius: 25px;
            text-align: center;
            margin: 10px;
        }

        button {
            width: 20%;
            height: 70px;
            background-color: rgb(0, 167, 0);
            color: white;
            font-size: 26px;
            border: none;
            border-radius: 9px;
            margin: 20px;
        }
    </style>
</head>

<body>
    <div class="main-container" id="main-container">
        <h1>Print Fibonacci Sequence</h1>
        <input type="number" placeholder="Enter fibonacci count" id="input" />
        <button onclick="printFibonacci()">Print Sequence</button>
    </div>
    <script>
        function printFibonacci() {

            let num = 1;
            let num2 = 1;
            let inc = 0;
            let totalNumbers = Number(document.getElementById("input").value);
            let nextNum;
            if (totalNumbers < 1) {
                alert("Total numbers can't be less than 1");
            } 
            else if (totalNumbers == 1) {
                document.getElementById("main-container").innerHTML += "<h2>1</h2>";
            } 
            else if (totalNumbers == 2) {
                document.getElementById("main-container").innerHTML += "<h2>1</h2>";
                document.getElementById("main-container").innerHTML += "<h2>1</h2>";
            } 
            else {
                document.getElementById("main-container").innerHTML += "<h2>1</h2>";
                document.getElementById("main-container").innerHTML += "<h2>1</h2>";

                while (inc < totalNumbers-2) {
                    nextNum = num2 + num;
                    num = num2;
                    num2 = nextNum;
                    document.getElementById("main-container").innerHTML +=
                        "<h2>" + BigInt(nextNum) + "</h2>";
                    inc++;
                }
            }
        }
    </script>
</body>

</html>
