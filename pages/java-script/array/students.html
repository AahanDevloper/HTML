<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    .main-container {
      width: 100%;
      height: 100%;
    }

    .container {
      width: 100%;
      height: 20%;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
    }

    button {
      width: 20%;
      height: 34%;
      background-color: rgb(0, 166, 47);
      color: white;
      font-size: 22px;
      border: none;
      border-radius: 9px;
    }

    input {
      width: 30%;
      height: 32%;
      font-size: 23px;
      border-radius: 25px;
      text-align: center;
    }

    .student-list {
      width: 100%;
      height: 80%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 95%;
      height: 13%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      background-color: aqua;
      margin-top: 30px;
    }

    .remove {
      width: 14%;
      height: 80%;
      background-color: red;
      margin-left: 900px;
    }

    h2 {
      margin-left: 20px;
    }
  </style>
</head>

<body>
  <div class="main-container">
    <div class="container">
      <input type="text" id="student" placeholder="Enter student name" />
      <button onclick="addStudent()">Save</button>
    </div>
    <div class="student-list" id="list"></div>
  </div>
  <script>
    let students = [];
    let student;
    let i = 0; 
    function addStudent() {
      
      student = document.getElementById("student").value;
      students[i] = student;
      while (i < students.length) {
        document.getElementById("list").innerHTML +=
          "<div class='card' id='card" + i + "'><h2>" + students.length + "</h2><h2>" + students[i] + "</h2><button class='remove' onclick='remove(" + i + ")'>Remove</button></div>";
        i++;
      }
    }
    function remove(index) {
      students.splice(index,1)
      document.getElementById("list").innerHTML =""
      i=1
      while (i <= students.length) {
        document.getElementById("list").innerHTML +=
          "<div class='card' id='card" + i + "'><h2>" + (i) + "</h2><h2>" + students[i-1] + "</h2><button class='remove' onclick='remove(" + i + ")'>Remove</button></div>";
        i++;
      }
    }
  </script>
</body>

</html>
