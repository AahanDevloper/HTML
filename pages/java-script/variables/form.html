<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Form</title>
    <!-- Bootstrap css link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div class="container mt-3 d-flex">
      <div class="card w-50">
        <div class="card-header text-center bg-info">
          <h1 class="text-white">Form</h1>
        </div>
        <div class="card-body">
          <form>
            <!-- full name -->
            <div class="mt-4">
              <label class="form-label">Full Name</label>
              <input
                id="name"
                type="text"
                class="form-control"
                placeholder="Enter Name"
              />
            </div>
            <!-- address -->
            <div class="mt-4">
              <label class="form-label">Address</label>
              <textarea
                id="address"
                type="text"
                class="form-control"
                placeholder="Enter Address"
              ></textarea>
            </div>
            <!-- gender -->
            <div class="mt-4">
              <label class="form-label">Gender</label>
              <div class="form-check form-check-line">
                <input type="radio" class="form-check-input" name="gender" />
                <label class="form-check-line">Male</label>
              </div>
              <div class="form-check form-check-line">
                <input type="radio" class="form-check-input" name="gender" />
                <label class="form-check-line">Female</label>
              </div>
            </div>
            <!-- phone number -->
            <div class="mt-4">
              <label class="form-label">Phone Number</label>
              <input
                id="phone"
                type="number"
                class="form-control"
                placeholder="Enter Phone Number"
              />
            </div>
            <!-- email address -->
            <div class="mt-4">
              <label class="form-label">Email Address</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="Enter Email Address"
              />
            </div>
            <!-- school -->
            <div class="mt-4">
              <label class="form-label">School's Name</label>
              <input
                id="school"
                type="text"
                class="form-control"
                placeholder="Enter School"
              />
            </div>

            <div class="d-grid mt-4">
              <button onclick="submitInfo()" class="btn btn-success">
                Submit Information
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="container mt-3">
      <h2 class="text-center text-black" id="name-val"></h2>
      <h2 class="text-center text-black" id="address-val"></h2>
      <h2 class="text-center text-black" id="phone-val"></h2>
      <h2 class="text-center text-black" id="email-val"></h2>
      <h2 class="text-center text-black" id="school-val"></h2>
    </div>

    <script>
      function submitInfo() {
        console.log("hi");
        let name = document.getElementById("name").value;
        let adderss = document.getElementById("address").value;
        let phone = document.getElementById("phone").value;
        let email = document.getElementById("email").value;
        let school = document.getElementById("school").value;

        document.getElementById("name-val").innerHTML = name;
        document.getElementById("address-val").innerHTML = address;
        document.getElementById("phone-val").innerHTML = phone;
        document.getElementById("email-val").innerHTML = email;
        document.getElementById("school-val").innerHTML = school;
      }
    </script>
  </body>
</html>
