<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        body{
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        .main-container{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            background-color: rgb(247, 247, 247);
        }
        h1{
            margin-top: 30px;
            margin-bottom: 5px;
        }
        h2{
            font-size: 22px;
            font-weight: 500;
            margin-top: 9px;
            margin-bottom: 9px;
            margin-left: 15px;
        }
        h3{
            color: rgb(0, 202, 145);
            margin-left: 15px;
            margin-top: 9px;
            margin-bottom: 9px;
        }
        p{
            margin: 5px;
            color: rgb(139, 139, 139);
        }
        .card-container{
            width: 100%;
            height: 79%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 25px;
        }
        .card{
            width: 27%;
            height: 100%;
            background-color: white;
            box-shadow: 0.5px 1px 3px 3px rgb(236, 236, 236);
            border-radius: 12px;
        }
        img{
            width: 100%;
            height: 61%;
        }
        .header{
            width: 100%;
            height: 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .new{
            width: auto;
            height: 60%;
            background-color: rgb(211, 255, 225);
            color: rgb(0, 192, 0);
            border-radius: 20px;
            margin-left: 10px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .like{
            width: 34px;
            height: 34px;
            box-shadow: 0.5px 1px 4px 1px rgb(182, 182, 182);
            border-radius: 20px;
            margin-right: 10px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        b{
            padding: 10px;
        }
        button{
            width: 90%;
            height: 7%;
            background-color: black;
            color: white;
            border-radius: 22px;
            margin-top: 17px;
            font-size: 15px;
            display: flex;
            justify-self: center;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h1>🔥 Trending Sneakers Collection</h1>
        <p>Discover the latest styles with comfort and performance</p>
        <div class="card-container">

            <!-- card 1 -->
            <div class="card">
                <div class="header">
                    <div class="new"><b>Best Seller</b></div>
                    <div class="like">🩷</div>
                </div>
                <img src="https://png.pngtree.com/png-clipart/20240901/original/pngtree-sports-shoes-png-image_15910407.png" alt="Shoes">
                <!-- description -->
                <p style="margin-left: 15px;">Nike</p>
                <h2>Dunk High "Green Satin"</h2>
                <h3>$180.00</h3>
                <button>Buy Now</button>
            </div>

            <!-- card 2 -->
            <div class="card">
                <!-- heading -->
                <div class="header">
                    <div class="new"></div>
                    <div class="like">🩷</div>
                </div>
                <!-- image -->
                <img src="https://png.pngtree.com/png-vector/20241018/ourmid/pngtree-running-shoes-or-sneakers-on-a-transparent-background-png-image_14112954.png" alt="Shoes">
                <!-- description -->
                <p style="margin-left: 15px;">Nike</p>
                <h2>Running Shoe</h2>
                <h3>$69.99</h3>
                <button>Buy Now</button>
            </div>

            <!-- card 3 -->
            <div class="card">
                <!-- heading -->
                <div class="header">
                    <div class="new"><b>New</b></div>
                    <div class="like">🩷</div>
                </div>
                <!-- image -->
                <img src="https://png.pngtree.com/png-vector/20240520/ourmid/pngtree-women-s-shoes-sneakers-trainers-in-white-and-orange-png-image_12494915.png" alt="Shoes">
                <!-- description -->
                <p style="margin-left: 15px;">Nike</p>
                <h2>Air Max Sport</h2>
                <h3>$120.00</h3>
                <button>Buy Now</button>
            </div>
        </div>
    </div>
</body>

</html>
