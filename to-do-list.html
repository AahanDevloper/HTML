<!doctype html>
<html lang="en">
  <head>
    <title>To Do List</title>
    <style>
      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
      }
      .main-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      input {
        width: 35%;
        height: 6%;
        border-radius: 25px;
        border: 2px blue solid;
        font-size: 21px;
        color: blue;
        margin-top: 25px;
        text-align: center;
      }
      .create {
        width: 18%;
        height: 7%;
        border-radius: 8px;
        border: none;
        color: white;
        font-size: 23px;
        background-color: rgb(0, 102, 255);
        margin-top: 20px;
        margin-left: 0;
      }
      .list {
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }
      .box {
        margin-top: 20px;
        width: 95%;
        height: 70px;
        border: 2px solid blue;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      button {
        height: 80%;
        width: 50%;
        margin-left: 14px;
        border-radius: 10px;
        font-size: 25px;
        background-color: rgb(255, 255, 255);
        color: rgb(255, 0, 0);
        border: red solid 2px;
      }
      h2 {
        margin-left: 35px;
        color: blue;
      }
      .buttons {
        width: 20%;
        height: 90%;
        margin-top: 0;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
      }
      .check {
        width: 30px;
        height: 30px;
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <input type="text" id="input" placeholder="Enter Task" />
      <button class="create" onclick="create()">Create</button>
      <div class="list" id="list"></div>
    </div>
    <script>
      let inc = 0;
      let tasks = [];
      function create() {
        let task = document.getElementById("input").value;
        tasks.push(task);
        document.getElementById("list").innerHTML +=
          "<div class='box' id='box" +
          inc +
          "'><h2>" +
          task +
          "</h2><div class='buttons'><button onclick='remove(" +
          inc +
          ")'>❌</button><input class='check' type='checkbox'></div></div>";
        inc++;
      }
      function remove(number) {
        document.getElementById("box" + number).style.display = "none";
      }
    </script>
  </body>
</html>
